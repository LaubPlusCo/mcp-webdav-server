# WebDAV server configuration for use with MCP WebDAV server
address: 0.0.0.0
port: 6060

# Directory that will store the WebDAV files
directory: /data

# Enable debug logging
debug: true

# Enable CORS to allow WebDAV access
cors:
  enabled: true
  credentials: true
  allowed_headers:
    - Depth
    - Authorization
    - Content-Type
    - X-Requested-With
  allowed_hosts:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PROPFIND
    - PROPPATCH
    - MKCOL
    - COPY
    - MOVE
    - LOCK
    - UNLOCK
  exposed_headers:
    - Content-Length
    - Content-Range

# Define default permissions
permissions: CRUD

# Define users with access to the WebDAV server
users:
  # Admin user with full permissions
  - username: admin
    password: admin
    permissions: CRUD
  
  # Read-only user
  - username: reader
    password: reader
    permissions: R
